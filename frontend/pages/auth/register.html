<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Crear Cuenta - ITERA</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&family=Montserrat:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .editorial-kern {
      letter-spacing: -0.04em;
    }
    /* Floating label animation — only for text inputs, NOT checkboxes */
    .floating-input:focus + label,
    .floating-input:not(:placeholder-shown) + label {
      transform: translateY(-2.25rem) scale(0.75);
      color: #005ac4;
      letter-spacing: 0.05em;
    }
    select:focus + label,
    select:not([value=""]) + label {
      transform: translateY(-2.25rem) scale(0.75);
      color: #005ac4;
      letter-spacing: 0.05em;
    }
    .floating-input:focus {
      outline: none;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f8f9fa; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
  </style>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":              "#005ac4",
            "on-primary":           "#ffffff",
            "surface":              "#fcfdfe",
            "on-surface":           "#191c1d",
            "on-surface-variant":   "#414755",
            "outline-variant":      "#c1c6d7",
            "itera-azure":          "#005ac4",
            "error-container":      "#ffdad6",
            "on-error-container":   "#93000a"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body":     ["Inter"]
          }
        }
      }
    }
  </script>

<link rel="icon" type="image/png" href="../../assets/logo/logo-fondoblanco.png" style="background-color: white;">
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-x-hidden">

<main class="min-h-screen flex flex-col lg:flex-row">

  <!-- ── Left Section: Editorial Image & Typography ── -->
  <div class="relative w-full lg:w-[45%] h-[50vh] lg:h-screen overflow-hidden lg:fixed lg:left-0 lg:top-0">
    <img
      alt="Serene mountain landscape"
      class="absolute inset-0 w-full h-full object-cover object-center scale-105"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpj6cdwT4hWu5LD8l1xRXemJakXpsQf__Y414kYWSbLh1Y7wozTuIDEI4F9wzGhd3AiZhQikBuiUD-ulJ3TUxbQ9tNv8CXIowsMR0usaNjt7r5VptmMjFds25eAOZYS7WmgoKFz8tFOlDR6SXqykz8fkD8CTYG5gjpkSvCLpfax5PhF3Nca3Q8xrnKp3Klh41bYk9gGTPgVStheRsE3mzPSrNt8fUY8Z_yS8FIEwsiKIBFTyaBWAtQSG5N0EKjaMF3Sb9832YU5pIE"
    />
    <div class="absolute inset-0 bg-black/10 mix-blend-multiply"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>

    <div class="absolute bottom-0 left-0 p-12 lg:p-20 text-white w-full">
      <h1 class="text-2xl font-medium uppercase tracking-widest text-white mb-12" style="font-family: 'Montserrat', sans-serif;">ITER<span style="letter-spacing: -2px;">Λ</span></h1>
      <div class="max-w-md">
        <span class="text-xs font-bold uppercase tracking-[0.3em] mb-4 block opacity-80">The New Standard</span>
        <h2 class="text-5xl lg:text-7xl font-headline font-extrabold editorial-kern leading-[0.95] mb-6">
          Redefine <br/>Your Journey.
        </h2>
        <p class="text-lg font-light opacity-90 leading-relaxed">
          Experience travel through a lens of absolute serenity and refined curation.
        </p>
      </div>
    </div>
  </div>

  <!-- ── Right Section: Modern Registration Form ── -->
  <div class="w-full lg:w-[55%] lg:ml-[45%] flex flex-col lg:h-screen lg:overflow-y-auto">
    <div class="flex-grow flex items-center justify-center p-6 lg:p-12">
      <div class="w-full max-w-xl">

        <!-- Header -->
        <div class="mb-6 flex flex-col lg:flex-row lg:items-end justify-between gap-3">
          <div>
            <h3 class="text-3xl lg:text-4xl font-headline font-extrabold editorial-kern text-on-surface">Crea tu cuenta</h3>
            <p class="text-on-surface-variant mt-2 font-light">Comienza a diseñar tu próximo capítulo.</p>
          </div>
          <div class="text-right">
            <span class="text-xs text-on-surface-variant block mb-1">¿Ya eres parte?</span>
            <a class="text-sm font-bold text-primary underline underline-offset-4 decoration-2" href="index.html">Iniciar Sesión</a>
          </div>
        </div>

        <!-- Feedback messages -->
        <div id="error-msg"   class="hidden mb-8 bg-error-container text-on-error-container p-4 rounded-xl text-sm font-semibold"></div>
        <div id="success-msg" class="hidden mb-8 bg-primary/10 text-primary p-4 rounded-xl text-sm font-semibold"></div>

        <!-- Registration Form -->
        <form id="form-register" class="space-y-0">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-8">

            <!-- Nombre -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-nombre" name="nombre" placeholder=" " type="text" required
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-nombre">
                Nombre
              </label>
            </div>

            <!-- Apellido -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-apellido" name="apellido" placeholder=" " type="text" required
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-apellido">
                Apellido
              </label>
            </div>

            <!-- Username -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-username" name="username" placeholder=" " type="text" required
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-username">
                Nombre de usuario
              </label>
            </div>

            <!-- Email -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-email" name="email" placeholder=" " type="email" required
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-email">
                Correo electrónico
              </label>
            </div>

            <!-- Contraseña -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-password" name="password" placeholder=" " type="password" required
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-password">
                Contraseña
              </label>
            </div>

            <!-- Confirmar Contraseña -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-confirm-password" name="confirm-password" placeholder=" " type="password" required
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-confirm-password">
                Confirmar Contraseña
              </label>
            </div>

            <!-- Nacionalidad (autocomplete) -->
            <div class="relative">
              <input
                class="floating-input peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-nacionalidad" name="nacionalidad" placeholder=" " type="text" autocomplete="off"
              />
              <label class="absolute left-0 top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em] transition-all duration-300 pointer-events-none" for="reg-nacionalidad">
                Nacionalidad
              </label>
              <ul id="nac-dropdown" class="hidden absolute z-50 left-0 top-full w-full max-h-48 overflow-y-auto bg-white border border-outline-variant rounded-xl shadow-lg mt-1"></ul>
            </div>

            <!-- Fecha de nacimiento / Edad -->
            <div class="relative">
              <input
                class="peer w-full border-0 border-b border-outline-variant bg-transparent pt-4 pb-2 focus:ring-0 focus:border-primary transition-colors text-on-surface font-medium"
                id="reg-dob" name="dob" type="date"
              />
              <label class="absolute left-0 -top-4 text-on-surface-variant uppercase text-xs font-bold tracking-[0.1em]" for="reg-dob">
                Fecha de nacimiento
              </label>
              <!-- Hidden edad field, computed by JS -->
              <input type="hidden" id="reg-edad" name="edad"/>
            </div>

          </div>

          <!-- Action Area -->
          <div class="pt-6 flex flex-row items-center gap-6 flex-wrap">
            <div class="flex items-center gap-3 flex-1 min-w-0">
              <input
                class="shrink-0 w-4 h-4 border-outline-variant text-primary focus:ring-primary/20 rounded-none"
                id="terms" type="checkbox" required
              />
              <label class="text-sm leading-snug text-on-surface-variant font-light" for="terms">
                Al unirte aceptas los <a class="font-bold text-on-surface" href="#">Términos de Servicio</a> y la <a class="font-bold text-on-surface" href="#">Política de Privacidad</a>.
              </label>
            </div>

            <button
              id="reg-btn"
              class="group relative px-12 py-5 bg-itera-azure text-white rounded-full font-headline font-bold text-sm tracking-widest uppercase overflow-hidden transition-transform hover:scale-105 active:scale-95 whitespace-nowrap"
              type="submit"
            >
              <span class="relative z-10">Comenzar mi viaje</span>
              <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
            </button>
          </div>
        </form>

      </div>
    </div>


  </div>

</main>

<script>
  // Restrict date of birth to past dates only
  const dobInput = document.getElementById('reg-dob');
  if (dobInput) {
    const today = new Date();
    const tzOffset = today.getTimezoneOffset() * 60000;
    const localISOTime = (new Date(Date.now() - tzOffset)).toISOString().split('T')[0];
    dobInput.max = localISOTime;

    // Compute "edad" from date-of-birth before form submission
    dobInput.addEventListener('change', function () {
      const dob = new Date(this.value);
      let age = today.getFullYear() - dob.getFullYear();
      const m = today.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
      document.getElementById('reg-edad').value = age;
    });
  }
</script>
<script src="auth.js"></script>
</body>
</html>
