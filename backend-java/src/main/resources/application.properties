# ==========================================
# ITERA Backend - Spring Boot Configuration
# ==========================================

# Puerto del servidor (igual que Python/uvicorn)
server.port=8000

# ==========================================
# Base de Datos MySQL (XAMPP / MariaDB)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/itera_mvp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ==========================================
# JPA / Hibernate
# ==========================================
# validate = Flyway crea las tablas, Hibernate solo verifica
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Flyway - Migraciones automáticas del schema
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true

# ==========================================
# Jackson - Serialización JSON
# ==========================================
# Usar snake_case globalmente para compatibilidad con el frontend
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ==========================================
# Google Places API (Llamadas directas desde Java)
# ==========================================
google.places.api.key=${GOOGLE_PLACES_API_KEY:}
google.translation.api.key=${GOOGLE_TRANSLATION_API_KEY:}

# ==========================================
# Archivos del Frontend (para FrontendController)
# ==========================================
frontend.dir=../frontend

# ==========================================
# IMPORTANTE: Deshabilitar Spring Security auto-config
# (solo usamos spring-security-crypto para BCrypt, no el stack completo)
# ==========================================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ==========================================
# Logging
# ==========================================
logging.level.com.itera=INFO
logging.level.org.springframework.web=WARN
logging.level.org.flywaydb=INFO

# ==========================================
# Multipart — Subida de fotos de atracciones (hasta 5 fotos)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=100MB
server.tomcat.max-swallow-size=-1
